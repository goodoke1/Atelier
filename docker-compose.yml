services:
  backend:
    build: ./app/backend
    restart: unless-stopped
    environment:
      - FASHION_AI_DB=/app/data/fashion_ai.db
      - FASHION_AI_UPLOADS=/app/uploads
      - MODEL_PROVIDER=${MODEL_PROVIDER:-claude}
      - FASHION_AI_STUB=${FASHION_AI_STUB:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-6}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llava}
    volumes:
      - db-data:/app/data
      - uploads:/app/uploads
    expose:
      - "8000"
    # Exposed on the host too, for direct API access / debugging.
    ports:
      - "8000:8000"

  frontend:
    build: ./app/frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${WEB_PORT:-3000}:80"

volumes:
  db-data:
  uploads:
